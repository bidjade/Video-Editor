name: Remove Music
on:
  workflow_dispatch:
    inputs:
      chat_id:
        required: true
      file_url:
        required: true
      file_name:
        required: true
      file_type:
        required: true

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        pip install demucs requests

    - name: Process Media
      env:
        BOT_TOKEN: "7916665951:AAE1so0RTgRkDrk1kIFa3kbWkBnTi2jf-AE"
        CHAT_ID: ${{ github.event.inputs.chat_id }}
        FILE_URL: ${{ github.event.inputs.file_url }}
        FILE_NAME: ${{ github.event.inputs.file_name }}
        FILE_TYPE: ${{ github.event.inputs.file_type }}
      run: |
        cat << 'EOF' > script.py
        import os
        import glob
        import requests

        BOT_TOKEN = os.environ['BOT_TOKEN']
        CHAT_ID = os.environ['CHAT_ID']
        FILE_URL = os.environ['FILE_URL']
        FILE_NAME = os.environ['FILE_NAME']
        FILE_TYPE = os.environ['FILE_TYPE']
        WORKDIR = 'music_workdir/'
        os.makedirs(WORKDIR, exist_ok=True)

        res = requests.get(FILE_URL)
        input_path = os.path.join(WORKDIR, FILE_NAME)
        with open(input_path, 'wb') as f:
            f.write(res.content)

        base_name = os.path.basename(input_path).rsplit('.', 1)[0]
        audio_temp = os.path.join(WORKDIR, "track_temp.wav")

        os.system(f'ffmpeg -i "{input_path}" -vn -acodec pcm_s16le -ar 44100 -ac 2 "{audio_temp}" -y')
        os.system(f'demucs --two-stems vocals "{audio_temp}" -o "{WORKDIR}"')

        search_path = glob.glob(os.path.join(WORKDIR, "**", "vocals.wav"), recursive=True)
        if not search_path:
            raise Exception("Demucs failed to produce vocals file.")
        vocals_path = search_path[0]

        if input_path.lower().endswith(('.mp4', '.mkv', '.mov', '.avi')) or FILE_TYPE == 'video':
            final_video = os.path.join(WORKDIR, f"{base_name}_clean.mp4")
            os.system(f'ffmpeg -i "{input_path}" -i "{vocals_path}" -map 0:v -map 1:a -c:v copy -c:a aac -shortest "{final_video}" -y')
            url = f"https://api.telegram.org/bot{BOT_TOKEN}/sendVideo"
            with open(final_video, 'rb') as video:
                requests.post(url, data={'chat_id': CHAT_ID, 'caption': '✅ Music removed from video'}, files={'video': video})
        else:
            final_audio = os.path.join(WORKDIR, f"{base_name}_vocals.mp3")
            os.system(f'ffmpeg -i "{vocals_path}" "{final_audio}" -y')
            url = f"https://api.telegram.org/bot{BOT_TOKEN}/sendAudio"
            with open(final_audio, 'rb') as audio:
                requests.post(url, data={'chat_id': CHAT_ID, 'caption': '✅ Music removed from audio'}, files={'audio': audio})

        if os.path.exists(audio_temp): os.remove(audio_temp)
        if os.path.exists(input_path): os.remove(input_path)
        EOF
        python script.py
