name: Generate Video

on:
  repository_dispatch:
    types: [run_merge]

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Download Files
        run: |
          curl -L "${{ github.event.client_payload.audio_url }}" -o audio.mp3
          curl -L "${{ github.event.client_payload.image_url }}" -o image.jpg
      - name: Render Video
        run: ffmpeg -loop 1 -i image.jpg -i audio.mp3 -c:v libx264 -tune stillimage -c:a aac -b:a 192k -pix_fmt yuv420p -shortest output.mp4
      - name: Check Size and Send
        env:
          BOT_TOKEN: ${{ github.event.client_payload.bot_token }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
        run: |
          FILE_SIZE=$(stat -c%s "output.mp4")
          MAX_SIZE=20971520
          if [ "$FILE_SIZE" -gt "$MAX_SIZE" ]; then
            git config --global user.name "GitHub Action"
            git config --global user.email "action@github.com"
            mkdir -p videos
            cp output.mp4 videos/output.mp4
            git add videos/output.mp4
            git commit -m "Add video"
            git push
            VIDEO_URL="https://raw.githubusercontent.com/${{ github.repository }}/main/videos/output.mp4"
            curl -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" -d "chat_id=${CHAT_ID}" -d "text=🎉 الفيديو جاهز وحجمه كبير! تفضل رابط الـ RAW المباشر: $VIDEO_URL"
          else
            curl -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendVideo" -F "chat_id=${CHAT_ID}" -F "video=@output.mp4" -F "caption=🎉 تم دمج الفيديو بنجاح!"
          fi